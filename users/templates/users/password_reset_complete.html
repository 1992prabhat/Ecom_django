{% extends "base.html" %}

{% block title %}Password Changed | TechStore{% endblock %}

{% block content %}

<section class="min-h-[80vh] flex items-center justify-center bg-gradient-to-br from-slate-100 to-green-50 py-16">

<div class="max-w-xl bg-white rounded-3xl shadow-xl p-10 text-center">

<div class="w-24 h-24 mx-auto rounded-full bg-green-100 flex items-center justify-center">

<i class="fa-solid fa-circle-check text-5xl text-green-600"></i>

</div>

<h1 class="text-4xl font-bold mt-8">

Password Updated

</h1>

<p class="mt-5 text-gray-600">

Your password has been reset successfully.

You can now log in using your new password.

</p>

<a href="{% url 'users:login' %}"

class="inline-block mt-8 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold">

Login

</a>

</div>

</section>

{% endblock %}
