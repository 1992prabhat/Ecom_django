{% extends "base.html" %}

{% block title %}Email Sent | TechStore{% endblock %}

{% block content %}

<section class="min-h-[80vh] flex items-center justify-center bg-gradient-to-br from-slate-100 to-blue-50 py-16">

    <div class="max-w-2xl bg-white rounded-3xl shadow-xl p-10 text-center">

        <div class="w-24 h-24 mx-auto rounded-full bg-blue-100 flex items-center justify-center">
            <i class="fa-solid fa-envelope-circle-check text-5xl text-blue-600"></i>
        </div>

        <h1 class="text-4xl font-bold mt-8">
            Check Your Email
        </h1>

        <p class="mt-5 text-gray-600 leading-8">
            We've emailed you instructions for resetting your password.
            If an account exists with that email address, you'll receive the reset link shortly.
        </p>

        <a href="{% url 'users:login' %}"
           class="inline-block mt-8 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold">

            Back to Login

        </a>

    </div>

</section>

{% endblock %}
