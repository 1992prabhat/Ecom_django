	<div class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-200 group flex flex-col h-full">

    <!-- Image -->
    <div class="relative">

        <img
            src="{{ product.image.url }}"
            class="h-64 w-full object-cover group-hover:scale-105 transition duration-500"
            alt="{{ product.name }}"
        >

        {% if product.stock > 10 %}
        <span class="absolute top-4 left-4 bg-green-600 text-white text-xs px-3 py-1 rounded-full">
            Best Seller
        </span>
        {% endif %}

        <button
            class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white shadow hover:bg-blue-600 hover:text-white transition">

            <i class="fa-regular fa-heart"></i>

        </button>

    </div>

    <!-- Body -->
    <div class="p-6 flex flex-col flex-grow">

        <h2 class="text-2xl font-semibold text-slate-800">
            {{ product.name }}
        </h2>

        <p class="text-slate-500 mt-3 line-clamp-3 flex-grow">
            {{ product.description|striptags|truncatewords:25 }}
        </p>

        <!-- Rating -->
        <div class="flex items-center gap-1 text-yellow-400 mt-4">

            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="far fa-star"></i>

            <span class="text-slate-500 text-sm ml-2">
                (4.0)
            </span>

        </div>

        <!-- Price -->
        <div class="flex justify-between items-center mt-6">

            <div>

                <span class="text-3xl font-bold text-green-600">
                    ₹{{ product.price }}
                </span>

            </div>

            {% if product.stock %}

                <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">
                    In Stock
                </span>

            {% else %}

                <span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-sm">
                    Out of Stock
                </span>

            {% endif %}

        </div>
				<a
					href="{{product.get_absolute_url}}"
					class="mt-6 text-center bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl transition">
					View Details

					</a>

    </div>

</div>
